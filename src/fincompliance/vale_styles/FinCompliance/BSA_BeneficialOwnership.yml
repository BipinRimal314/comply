# BSA/AML — Beneficial Ownership weak language (31 CFR 1010.230)
# CDD rule requires explicit, mandatory language about beneficial ownership.
# Flag vague or aspirational language around CDD requirements.
extends: existence
message: "BSA beneficial ownership: '%s'. CDD beneficial ownership requirements are mandatory. Use specific, mandatory language per 31 CFR 1010.230."
level: warning
ignorecase: true
tokens:
  - 'beneficial owner information will be collected'
  - 'beneficial ownership as required'
  - 'ownership information as applicable'
  - 'collect ownership information when'
  - 'beneficial ownership where required'
  - 'may collect beneficial ownership'
  - 'should collect beneficial ownership'
  - 'beneficial ownership if applicable'
