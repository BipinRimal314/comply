# BSA/AML — Beneficial Ownership and Foreign Shell Banks (31 CFR 1010.230)
# CDD rule requires documentation of beneficial ownership for legal entities.
# The 25% ownership threshold must be explicitly stated.
# Foreign shell bank prohibition must be addressed.
extends: existence
message: "BSA beneficial ownership concern: '%s'. Ensure CDD documentation explicitly addresses beneficial ownership thresholds and foreign shell bank prohibitions per 31 CFR 1010.230."
level: warning
ignorecase: true
tokens:
  - 'beneficial owner information will be collected'
  - 'beneficial ownership as required'
  - 'ownership information as applicable'
  - 'collect ownership information when'
  - 'shell bank'
  - 'foreign shell'
  - 'correspondent account'
