# PCI-DSS v4.0.1 — Password requirements updated.
# Minimum password length is now 12 characters (was 7 in v3.2.1).
# MFA required for all access to the CDE.
# Per PCI-DSS v4.0.1 Requirement 8.
extends: existence
message: "PCI password concern: '%s'. PCI-DSS v4.0.1 requires minimum 12-character passwords and MFA for all CDE access (Req 8)."
level: error
ignorecase: true
tokens:
  - 'minimum 7 characters'
  - 'minimum 8 characters'
  - 'at least 7 characters'
  - 'at least 8 characters'
  - 'minimum length of 7'
  - 'minimum length of 8'
  - 'seven character'
  - 'eight character minimum'
  - 'passwords must be at least 8'
  - 'passwords must be at least 7'
